<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcomDash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }

    /* AUTH */
    .auth-container { max-width: 400px; margin: 80px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
    .auth-container h2 { text-align: center; margin-bottom: 24px; color: #1a1a2e; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; }
    .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .btn { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    .btn:hover { background: #4338ca; }
    .auth-switch { text-align: center; margin-top: 16px; font-size: 14px; color: #666; }
    .auth-switch a { color: #4f46e5; cursor: pointer; }
    .error-msg { color: red; font-size: 13px; text-align: center; margin-top: 10px; }

    /* LAYOUT */
    .dashboard { display: none; }
    .sidebar { position: fixed; left: 0; top: 0; width: 220px; height: 100vh; background: #1a1a2e; padding: 20px 12px; z-index: 100; }
    .sidebar h3 { color: white; margin-bottom: 28px; font-size: 17px; padding: 0 8px; }
    .sidebar-menu a { display: block; padding: 10px 12px; color: #aaa; text-decoration: none; border-radius: 8px; margin-bottom: 4px; font-size: 14px; cursor: pointer; }
    .sidebar-menu a:hover, .sidebar-menu a.active { background: #4f46e5; color: white; }
    .main-content { margin-left: 220px; padding: 20px; min-height: 100vh; }

    /* TOPBAR */
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .topbar h2 { color: #1a1a2e; font-size: 20px; }
    .logout-btn { padding: 7px 14px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
    .stat-card { background: white; padding: 16px 20px; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .stat-card .label { font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 22px; font-weight: 700; }
    .stat-card.blue .value { color: #4f46e5; }
    .stat-card.green .value { color: #10b981; }
    .stat-card.red .value { color: #ef4444; }
    .stat-card.orange .value { color: #f59e0b; }

    /* FILTERS */
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 14px; border: 1px solid #ddd; border-radius: 20px; background: white; cursor: pointer; font-size: 12px; color: #555; }
    .filter-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }
    .shop-selector select { padding: 7px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }

    /* TABLE */
    .table-wrapper { background: white; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: #f8f9fa; position: sticky; top: 0; z-index: 10; }
    th { padding: 11px 14px; text-align: left; color: #666; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
    td { padding: 11px 14px; border-top: 1px solid #f0f0f0; vertical-align: middle; white-space: nowrap; }
    tr:hover td { background: #fafafa; }

    /* STATUS BADGES - Pancake style */
    .status-badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
    .status-0 { background: #dbeafe; color: #1d4ed8; }
    .status-1 { background: #e0f2fe; color: #0369a1; }
    .status-2 { background: #fef3c7; color: #92400e; }
    .status-3 { background: #d1fae5; color: #065f46; }
    .status-4 { background: #f3e8ff; color: #6b21a8; }
    .status-5 { background: #f3e8ff; color: #6b21a8; }
    .status-6 { background: #fee2e2; color: #991b1b; }
    .status-7 { background: #fee2e2; color: #b91c1c; }
    .status-9 { background: #fef3c7; color: #92400e; }

    /* SOURCE BADGE */
    .source-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; background: #f0f0f0; color: #555; }
    .source-fb { background: #dbeafe; color: #1d4ed8; }

    /* STICKY STATUS COL */
    .col-status { position: sticky; right: 0; background: white; box-shadow: -2px 0 6px rgba(0,0,0,0.05); }
    thead .col-status { background: #f8f9fa; }
    tr:hover .col-status { background: #fafafa; }

    /* PAGINATION */
    .pagination { display: flex; justify-content: center; gap: 6px; margin-top: 16px; padding-bottom: 8px; }
    .page-btn { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 13px; }
    .page-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }
    .page-btn:hover:not(.active) { background: #f0f0f0; }

    /* SHOPS */
    .shops-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .shop-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); cursor: pointer; border: 2px solid transparent; }
    .shop-card:hover { border-color: #4f46e5; }
    .shop-card h4 { color: #1a1a2e; margin-bottom: 4px; }
    .shop-card p { color: #888; font-size: 13px; }
    .add-shop-card { background: white; border: 2px dashed #ddd; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; color: #888; min-height: 100px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .add-shop-card:hover { border-color: #4f46e5; color: #4f46e5; }

    /* MODAL */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal.show { display: flex; }
    .modal-box { background: white; padding: 28px; border-radius: 12px; width: 420px; }
    .modal-box h3 { margin-bottom: 18px; font-size: 16px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
    .btn-cancel { flex: 1; padding: 10px; background: #f0f0f0; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-save { flex: 1; padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }

    .hidden { display: none; }
    .loading-row td { text-align: center; padding: 40px; color: #888; }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="authSection">
  <div class="auth-container">
    <h2 id="authTitle">Login</h2>
    <div id="nameGroup" class="form-group hidden">
      <label>Full Name</label>
      <input type="text" id="authName" placeholder="Enter your name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="Enter your email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="Enter your password">
    </div>
    <button class="btn" onclick="submitAuth()">Continue</button>
    <div id="authError" class="error-msg"></div>
    <div class="auth-switch">
      <span id="authSwitchText">Don't have an account?</span>
      <a onclick="toggleAuth()"> <span id="authSwitchLink">Register</span></a>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
  <div class="sidebar">
    <h3>📦 EcomDash</h3>
    <div class="sidebar-menu">
      <a onclick="showPage('orders')" id="menu-orders" class="active">📋 Orders</a>
      <a onclick="showPage('shops')" id="menu-shops">🏪 My Shops</a>
      <a onclick="showPage('accounts')" id="menu-accounts">👥 Accounts</a>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <h2 id="pageTitle">Orders</h2>
      <div style="display:flex;align-items:center;gap:12px;">
        <span id="welcomeUser" style="color:#666;font-size:13px;"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- ORDERS PAGE -->
    <div id="ordersPage">
      <div class="toolbar">
        <div class="shop-selector">
          <select id="shopSelect" onchange="loadOrders()">
            <option value="">-- Select Shop --</option>
          </select>
        </div>
        <div class="filters">
          <button class="filter-btn active" onclick="filterOrders('', this)">All</button>
          <button class="filter-btn" onclick="filterOrders('0', this)">New</button>
          <button class="filter-btn" onclick="filterOrders('1', this)">Confirmed</button>
          <button class="filter-btn" onclick="filterOrders('2', this)">Shipped</button>
          <button class="filter-btn" onclick="filterOrders('3', this)">Delivered</button>
          <button class="filter-btn" onclick="filterOrders('6', this)">Cancelled</button>
          <button class="filter-btn" onclick="filterOrders('7', this)">Returned</button>
        </div>
      </div>

      <div class="stats-grid" style="margin-bottom:16px;">
        <div class="stat-card blue"><div class="label">Total Orders</div><div class="value" id="statTotal">--</div></div>
        <div class="stat-card green"><div class="label">Delivered</div><div class="value" id="statDelivered">--</div></div>
        <div class="stat-card red"><div class="label">Returned</div><div class="value" id="statReturned">--</div></div>
        <div class="stat-card orange"><div class="label">Total COD</div><div class="value" id="statCOD">--</div></div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>POS #</th>
              <th>Customer</th>
              <th>Product</th>
              <th>Qty</th>
              <th>Amount</th>
              <th>Page / Store</th>
              <th>Source</th>
              <th>Date</th>
              <th class="col-status">Status</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr class="loading-row"><td colspan="9">Select a shop to load orders</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>

    <!-- SHOPS PAGE -->
    <div id="shopsPage" class="hidden">
      <div class="shops-grid" id="shopsGrid">
        <div class="add-shop-card" onclick="openAddShop()">+ Add Pancake POS Shop</div>
      </div>
    </div>

    <!-- ACCOUNTS PAGE -->
    <div id="accountsPage" class="hidden">
      <p style="color:#888; margin-top:20px;">Sub-accounts feature
