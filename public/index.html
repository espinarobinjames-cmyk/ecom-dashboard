<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecom Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
    
    /* AUTH */
    .auth-container { max-width: 400px; margin: 80px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
    .auth-container h2 { text-align: center; margin-bottom: 24px; color: #1a1a2e; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; }
    .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .btn { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    .btn:hover { background: #4338ca; }
    .auth-switch { text-align: center; margin-top: 16px; font-size: 14px; color: #666; }
    .auth-switch a { color: #4f46e5; cursor: pointer; text-decoration: none; }
    .error-msg { color: red; font-size: 13px; text-align: center; margin-top: 10px; }

    /* DASHBOARD */
    .dashboard { display: none; }
    .sidebar { position: fixed; left: 0; top: 0; width: 240px; height: 100vh; background: #1a1a2e; padding: 24px 16px; }
    .sidebar h3 { color: white; margin-bottom: 32px; font-size: 18px; padding: 0 8px; }
    .sidebar-menu a { display: block; padding: 10px 12px; color: #aaa; text-decoration: none; border-radius: 8px; margin-bottom: 4px; font-size: 14px; cursor: pointer; }
    .sidebar-menu a:hover, .sidebar-menu a.active { background: #4f46e5; color: white; }
    .main-content { margin-left: 240px; padding: 24px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .topbar h2 { color: #1a1a2e; }
    .logout-btn { padding: 8px 16px; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
    .stat-card .label { font-size: 13px; color: #888; margin-bottom: 8px; }
    .stat-card .value { font-size: 24px; font-weight: 700; color: #1a1a2e; }
    .stat-card.green .value { color: #10b981; }
    .stat-card.red .value { color: #ef4444; }
    .stat-card.blue .value { color: #4f46e5; }
    .stat-card.orange .value { color: #f59e0b; }

    /* FILTERS */
    .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn { padding: 8px 16px; border: 1px solid #ddd; border-radius: 20px; background: white; cursor: pointer; font-size: 13px; }
    .filter-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }

    /* ORDERS TABLE */
    .orders-table { background: white; border-radius: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); overflow: hidden; }
    .orders-table table { width: 100%; border-collapse: collapse; }
    .orders-table th { background: #f8f9fa; padding: 12px 16px; text-align: left; font-size: 13px; color: #666; }
    .orders-table td { padding: 12px 16px; border-top: 1px solid #f0f0f0; font-size: 14px; }
    .orders-table tr:hover td { background: #fafafa; }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .status-new { background: #dbeafe; color: #1d4ed8; }
    .status-delivered { background: #d1fae5; color: #065f46; }
    .status-shipped { background: #fef3c7; color: #92400e; }
    .status-cancelled { background: #fee2e2; color: #991b1b; }
    .status-returned { background: #f3e8ff; color: #6b21a8; }
    .status-confirmed { background: #e0f2fe; color: #0369a1; }

    /* SHOPS */
    .shops-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .shop-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); cursor: pointer; border: 2px solid transparent; }
    .shop-card:hover, .shop-card.active { border-color: #4f46e5; }
    .shop-card h4 { color: #1a1a2e; margin-bottom: 4px; }
    .shop-card p { color: #888; font-size: 13px; }
    .add-shop-btn { background: white; border: 2px dashed #ddd; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; color: #888; }
    .add-shop-btn:hover { border-color: #4f46e5; color: #4f46e5; }

    /* MODAL */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal.show { display: flex; }
    .modal-box { background: white; padding: 32px; border-radius: 12px; width: 400px; }
    .modal-box h3 { margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel { flex: 1; padding: 10px; background: #f0f0f0; border: none; border-radius: 8px; cursor: pointer; }
    .btn-save { flex: 1; padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; }

    /* PAGINATION */
    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
    .page-btn { padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 13px; }
    .page-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }

    .hidden { display: none; }
    .loading { text-align: center; padding: 40px; color: #888; }
    .shop-selector { margin-bottom: 16px; }
    .shop-selector select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="authSection">
  <div class="auth-container">
    <h2 id="authTitle">Login</h2>
    <div id="nameGroup" class="form-group hidden">
      <label>Full Name</label>
      <input type="text" id="authName" placeholder="Enter your name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="Enter your email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="Enter your password">
    </div>
    <button class="btn" onclick="submitAuth()">Continue</button>
    <div id="authError" class="error-msg"></div>
    <div class="auth-switch">
      <span id="authSwitchText">Don't have an account?</span>
      <a onclick="toggleAuth()"> <span id="authSwitchLink">Register</span></a>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
  <div class="sidebar">
    <h3>📦 EcomDash</h3>
    <div class="sidebar-menu">
      <a onclick="showPage('orders')" id="menu-orders" class="active">📋 Orders</a>
      <a onclick="showPage('shops')" id="menu-shops">🏪 My Shops</a>
      <a onclick="showPage('accounts')" id="menu-accounts">👥 Accounts</a>
    </div>
  </div>
  <div class="main-content">
    <div class="topbar">
      <h2 id="pageTitle">Orders</h2>
      <div>
        <span id="welcomeUser" style="margin-right:12px; color:#666; font-size:14px;"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- ORDERS PAGE -->
    <div id="ordersPage">
      <div class="shop-selector">
        <select id="shopSelect" onchange="loadOrders()">
          <option value="">-- Select Shop --</option>
        </select>
      </div>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card blue"><div class="label">Total Orders</div><div class="value" id="statTotal">--</div></div>
        <div class="stat-card green"><div class="label">Delivered</div><div class="value" id="statDelivered">--</div></div>
        <div class="stat-card red"><div class="label">Returned</div><div class="value" id="statReturned">--</div></div>
        <div class="stat-card orange"><div class="label">Total COD</div><div class="value" id="statCOD">--</div></div>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="filterOrders('', this)">All</button>
        <button class="filter-btn" onclick="filterOrders('0', this)">New</button>
        <button class="filter-btn" onclick="filterOrders('1', this)">Confirmed</button>
        <button class="filter-btn" onclick="filterOrders('2', this)">Shipped</button>
        <button class="filter-btn" onclick="filterOrders('3', this)">Delivered</button>
        <button class="filter-btn" onclick="filterOrders('6', this)">Cancelled</button>
        <button class="filter-btn" onclick="filterOrders('7', this)">Returned</button>
      </div>
      <div class="orders-table">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Customer</th>
              <th>Product</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="6" class="loading">Select a shop to load orders</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>

    <!-- SHOPS PAGE -->
    <div id="shopsPage" class="hidden">
      <div class="shops-grid" id="shopsGrid">
        <div class="add-shop-btn" onclick="openAddShop()">+ Add Pancake POS Shop</div>
      </div>
    </div>

    <!-- ACCOUNTS PAGE -->
    <div id="accountsPage" class="hidden">
      <p style="color:#888;">Sub-accounts feature coming soon!</p>
    </div>
  </div>
</div>

<!-- ADD SHOP MODAL -->
<div class="modal" id="addShopModal">
  <div class="modal-box">
    <h3>Add Pancake POS Shop</h3>
    <div class="form-group">
      <label>Shop Name</label>
      <input type="text" id="shopName" placeholder="e.g. Shimano PH Store">
    </div>
    <div class="form-group">
      <label>Pancake API Key</label>
      <input type="text" id="shopApiKey" placeholder="Enter API Key">
    </div>
    <div class="form-group">
      <label>Pancake Shop ID</label>
      <input type="text" id="shopId" placeholder="e.g. 1636049864">
    </div>
    <div id="shopError" class="error-msg"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddShop()">Cancel</button>
      <button class="btn-save" onclick="saveShop()">Connect Shop</button>
    </div>
  </div>
</div>

<script>
  const API = '';
  let token = localStorage.getItem('token');
  let currentPage = 1;
  let currentStatus = '';
  let currentShopId = '';
  let isLogin = true;

  // Check if logged in
  if (token) showDashboard();

  function toggleAuth() {
    isLogin = !isLogin;
    document.getElementById('authTitle').textContent = isLogin ? 'Login' : 'Register';
    document.getElementById('authSwitchLink').textContent = isLogin ? 'Register' : 'Login';
    document.getElementById('authSwitchText').textContent = isLogin ? "Don't have an account?" : 'Already have an account?';
    document.getElementById('nameGroup').classList.toggle('hidden', isLogin);
  }

  async function submitAuth() {
    const email = document.getElementById('authEmail').value;
    const password = document.getElementById('authPassword').value;
    const name = document.getElementById('authName').value;
    const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
    const body = isLogin ? { email, password } : { name, email, password };

    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      token = data.token;
      showDashboard();
    } catch (err) {
      document.getElementById('authError').textContent = err.message;
    }
  }

  function showDashboard() {
    document.getElementById('authSection').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    document.getElementById('welcomeUser').textContent = `Hi, ${user.name || 'User'}!`;
    loadShops();
  }

  function logout() {
    localStorage.clear();
    location.reload();
  }

  function showPage(page) {
    document.getElementById('ordersPage').classList.add('hidden');
    document.getElementById('shopsPage').classList.add('hidden');
    document.getElementById('accountsPage').classList.add('hidden');
    document.getElementById(`${page}Page`).classList.remove('hidden');
    document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
    document.getElementById(`menu-${page}`).classList.add('active');
    const titles = { orders: 'Orders', shops: 'My Shops', accounts: 'Accounts' };
    document.getElementById('pageTitle').textContent = titles[page];
    if (page === 'shops') loadShops();
  }

  async function loadShops() {
    try {
      const res = await fetch('/api/shops', { headers: { Authorization: `Bearer ${token}` } });
      const shops = await res.json();
      const select = document.getElementById('shopSelect');
      const grid = document.getElementById('shopsGrid');
      select.innerHTML = '<option value="">-- Select Shop --</option>';
      grid.innerHTML = '<div class="add-shop-btn" onclick="openAddShop()">+ Add Pancake POS Shop</div>';
      shops.forEach(shop => {
        select.innerHTML += `<option value="${shop.id}">${shop.name}</option>`;
        grid.innerHTML = `<div class="shop-card" onclick="selectShop('${shop.id}')">
          <h4>${shop.name}</h4>
          <p>Shop ID: ${shop.shop_id}</p>
          <p style="margin-top:8px;color:#ef4444;font-size:12px;cursor:pointer;" onclick="deleteShop(event,'${shop.id}')">Remove</p>
        </div>` + grid.innerHTML;
      });
    } catch (err) { console.error(err); }
  }

  function selectShop(id) {
    document.getElementById('shopSelect').value = id;
    showPage('orders');
    loadOrders();
  }

  async function loadOrders() {
    currentShopId = document.getElementById('shopSelect').value;
    if (!currentShopId) return;
    document.getElementById('ordersBody').innerHTML = '<tr><td colspan="6" class="loading">Loading orders...</td></tr>';
    try {
      let url = `/api/orders/${currentShopId}?page=${currentPage}`;
      if (currentStatus !== '') url += `&status=${currentStatus}`;
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      renderOrders(data);
    } catch (err) {
      document.getElementById('ordersBody').innerHTML = '<tr><td colspan="6" class="loading">Error loading orders</td></tr>';
    }
  }

  function renderOrders(data) {
    const tbody = document.getElementById('ordersBody');
    if (!data.orders || data.orders.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="loading">No orders found</td></tr>';
      return;
    }

    // Stats
    if (data.aggs) {
      document.getElementById('statTotal').textContent = data.total_entries || 0;
      const aggs = data.aggs.status?.buckets || [];
      const delivered = aggs.find(b => b.key === '3')?.doc_count || 0;
      const returned = aggs.find(b => b.key === '7')?.doc_count || 0;
      document.getElementById('statDelivered').textContent = delivered;
      document.getElementById('statReturned').textContent = returned;
      document.getElementById('statCOD').textContent = '₱' + (data.aggs.cod?.value || 0).toLocaleString();
    }

    const statusMap = {
      0: ['New', 'status-new'],
      1: ['Confirmed', 'status-confirmed'],
      2: ['Shipped', 'status-shipped'],
      3: ['Delivered', 'status-delivered'],
      4: ['Returning', 'status-returned'],
      5: ['Returned', 'status-returned'],
      6: ['Cancelled', 'status-cancelled'],
      7: ['Returned', 'status-returned'],
      9: ['Sent to Partner', 'status-shipped']
    };

    tbody.innerHTML = data.orders.map(order => {
      const [statusText, statusClass] = statusMap[order.status] || ['Unknown', ''];
      const product = order.items?.[0]?.variation_info?.name || 'N/A';
      const date = new Date(order.inserted_at).toLocaleDateString('en-PH');
      return `<tr>
        <td>#${order.system_id}</td>
        <td>${order.bill_full_name}</td>
        <td>${product}</td>
        <td>₱${order.total_price?.toLocaleString()}</td>
        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
        <td>${date}</td>
      </tr>`;
    }).join('');

    // Pagination
    const pagination = document.getElementById('pagination');
    pagination.innerHTML = '';
    for (let i = 1; i <= Math.min(data.total_pages, 10); i++) {
      pagination.innerHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    }
    if (data.total_pages > 10) {
      pagination.innerHTML += `<span style="padding:8px;">... ${data.total_pages} pages</span>`;
    }
  }

  function filterOrders(status, btn) {
    currentStatus = status;
    currentPage = 1;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadOrders();
  }

  function goToPage(page) {
    currentPage = page;
    loadOrders();
  }

  function openAddShop() { document.getElementById('addShopModal').classList.add('show'); }
  function closeAddShop() { document.getElementById('addShopModal').classList.remove('show'); }

  async function saveShop() {
    const name = document.getElementById('shopName').value;
    const api_key = document.getElementById('shopApiKey').value;
    const shop_id = document.getElementById('shopId').value;
    document.getElementById('shopError').textContent = '';
    try {
      const res = await fetch('/api/shops', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ name, api_key, shop_id })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      closeAddShop();
      loadShops();
    } catch (err) {
      document.getElementById('shopError').textContent = err.message;
    }
  }

  async function deleteShop(e, id) {
    e.stopPropagation();
    if (!confirm('Remove this shop?')) return;
    await fetch(`/api/shops/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
    loadShops();
  }
</script>
</body>
</html>
